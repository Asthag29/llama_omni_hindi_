data:
  path: "data"
  json_path: "${data.path}/datasets.json"
  audio_root: "${data.path}/flac"
  validation_split: 0.02
  test_split: 0.02
  train_fraction: 1.0
  val_fraction: 1.0
  test_fraction: 1.00
  seed: 42
  input_type: "mel"
  mel_size: 128
  num_workers: 4
  
model:
  name: "llama"
  path: "models/llama"
  config_path: "models/llama"
  model_base: "models/llama"
  tokenizer_path: "models/llama"
  init_checkpoint: outputs/stage_1/backbone_text/final_model
  model_max_length: 2048

training:
  num_train_epochs: 3
  batch_size: 2
  gradient_accumulation_steps: 7
  learning_rate: 0.000107467137359001
  tune_speech_projector: true  #!important
  tune_llm_backbone: true #!important
  tune_speech_encoder: false #!important
  use_lora: true #!important
  lora_r: 128
  lora_alpha: 64  # scaling factor = r/alpha
  lora_dropout: 0.05
  gradient_checkpointing: true
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.00
  max_grad_norm: 1.8
  precision: "bf16-mixed"
  accelerator: "auto"
  devices: "auto"
  strategy: "auto"
  log_every_n_steps: 20
  val_check_interval: 0.25
  fast_dev_run: false
  attn_implementation: "sdpa"

logging:
  output_dir: "outputs/combined/speech_text"
  log_file: "logs/train.log"
  csv: true
  csv_metrics_file: "csv/metrics.csv"
  tensorboard: false
  wandb: true
  wandb_project: "hindi_llama_omni"
  wandb_run_id: null
  wandb_run_name: "combined-speech-text"
  checkpoint_monitor: "val_loss"
  checkpoint_format: "safetensors"
  save_top_k: 1
  save_last: true
  save_weights_only: true# only used when checkpoint_format=lightning

hydra:
  run:
    dir: ${logging.output_dir}/hydra/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ${logging.output_dir}/hydra_sweeps
    subdir: ${hydra.job.num}
